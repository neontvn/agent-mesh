<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentMesh Research</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="12" cy="12" r="2.4"></circle>
                    <circle cx="4" cy="6" r="2"></circle>
                    <circle cx="20" cy="6" r="2"></circle>
                    <circle cx="4" cy="18" r="2"></circle>
                    <circle cx="20" cy="18" r="2"></circle>
                    <line x1="5.7" y1="6.7" x2="10.2" y2="11"></line>
                    <line x1="18.3" y1="6.7" x2="13.8" y2="11"></line>
                    <line x1="5.7" y1="17.3" x2="10.2" y2="13"></line>
                    <line x1="18.3" y1="17.3" x2="13.8" y2="13"></line>
                </svg>
                <span class="logo-text">Agent<strong>Mesh</strong> Research</span>
            </div>
            <a href="http://localhost:8082" target="_blank" class="viz-link">Open Mesh Viz</a>
        </header>

        <main class="main">
            <form id="research-form" class="form">
                <input
                    id="question-input"
                    class="question-input"
                    type="text"
                    placeholder="Ask a research question..."
                    autocomplete="off"
                    autofocus
                />
                <button type="submit" id="submit-btn" class="submit-btn">Research</button>
            </form>

            <div class="content">
                <section class="trace-panel">
                    <h2>Trace</h2>
                    <ul id="trace-list" class="trace-list">
                        <li class="placeholder">Planner narration will appear here as the pipeline runs.</li>
                    </ul>
                </section>

                <section class="answer-panel">
                    <h2>Answer</h2>
                    <div id="answer-body" class="answer-body">
                        <p class="placeholder">Submit a question above to see the synthesized answer.</p>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
