syntax = "proto3";

package agentmesh.v1;

option go_package = "github.com/neontvn/agent-mesh/proto/agentmesh/v1;agentmeshv1";

// ControlPlane is the gRPC service exposed by the AgentMesh control plane
// to sidecar data planes running alongside each agent.
service ControlPlane {
    // Register registers an agent with the control plane. The control plane
    // materializes the registration as an Agent CRD in the Kubernetes cluster
    // and returns a lease handle that the sidecar must refresh via Heartbeat.
    rpc Register(RegisterRequest) returns (RegisterResponse);

    // Heartbeat refreshes the lease of a previously-registered agent. If a
    // heartbeat is not received within the lease TTL, the control plane marks
    // the agent unhealthy and removes it from the active pool.
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

    // Discover returns all healthy agents advertising the requested
    // capability. Used by sidecars that maintain a local routing cache.
    rpc Discover(DiscoverRequest) returns (DiscoverResponse);

    // SelectTarget returns a single agent chosen by the control plane's
    // routing policy (round-robin in v0) from the healthy agents advertising
    // the requested capability. Used by sidecars that defer routing to the
    // control plane.
    rpc SelectTarget(SelectTargetRequest) returns (SelectTargetResponse);

    // ReportInvoke is called by a sidecar after each A2A Invoke completes
    // so the control plane can broadcast routing events to observability
    // subscribers (the live UI, metrics, traces).
    rpc ReportInvoke(ReportInvokeRequest) returns (ReportInvokeResponse);

    // ReportTaskEvent is called by a sidecar on each A2A task state transition
    // (submitted, working, completed, failed, ...) so the control plane can
    // broadcast task lifecycle to observability subscribers (the live UI).
    rpc ReportTaskEvent(ReportTaskEventRequest) returns (ReportTaskEventResponse);
}

// RegisterRequest is sent by a sidecar when its local agent starts up.
message RegisterRequest {
    // Unique identifier for this agent instance.
    // Convention: <agent-name>-<pod-uid>.
    string agent_id = 1;
  
    // Capabilities advertised by this agent (e.g., "search", "summarize").
    repeated string capabilities = 2;

    // Network endpoint where this agent (via its sidecar) receives A2A traffic.
    // Typically a Kubernetes Service or Pod IP plus port.
    string endpoint = 3;

    // Free-form metadata describing the agent (framework, version, etc.).
    map<string, string> metadata = 4;

    // A2A AgentCard for this agent, serialized as canonical JSON. Optional;
    // populated when the sidecar runs the A2A data plane. The card's JSON form
    // is its source of truth, so it is carried verbatim rather than re-modeled
    // as nested protobuf messages.
    string agent_card = 5;
}

// RegisterResponse is returned to the sidecar after a successful registration.
message RegisterResponse {
    // Opaque lease handle. Must be supplied on subsequent Heartbeat calls.
    string lease_id = 1;

    // Lease time-to-live in seconds. The sidecar should send Heartbeats more
    // frequently than this value (typical: at 1/3 of TTL).
    int32 lease_ttl_seconds = 2;
}
  
// HeartbeatRequest is sent by a sidecar at a regular interval to refresh
// its agent's registration.  
message HeartbeatRequest {
    // The agent that is heartbeating; must match a prior Register call.
    string agent_id = 1;

    // The lease handle returned by Register.
    string lease_id = 2;

    // Current health state of the agent.
    HealthState health = 3;

    // Normalized load metric in [0.0, 1.0]. Used by the routing engine
    // for least-loaded selection in later milestones.
    double load = 4;
}

// HeartbeatResponse acknowledges a heartbeat and returns the refreshed TTL.
message HeartbeatResponse {
    int32 lease_ttl_seconds = 1;
}

// HealthState describes an agent's runtime health.
enum HealthState {
    HEALTH_STATE_UNSPECIFIED = 0;
    HEALTH_STATE_HEALTHY = 1;
    HEALTH_STATE_DEGRADED = 2;
    HEALTH_STATE_UNHEALTHY = 3;
}

// DiscoverRequest asks the control plane for healthy agents advertising
// a given capability.
message DiscoverRequest {
    string capability = 1;
}

// DiscoverResponse returns the matching agents.
message DiscoverResponse {
    repeated AgentInfo agents = 1;
}

// SelectTargetRequest asks the control plane to choose a single healthy
// agent advertising a given capability.
message SelectTargetRequest {
    string capability = 1;
}

// SelectTargetResponse returns the chosen agent.
message SelectTargetResponse {
    AgentInfo agent = 1;
}

// AgentInfo describes an agent available for routing.
message AgentInfo {
    string agent_id = 1;
    repeated string capabilities = 2;
    string endpoint = 3;
    map<string, string> metadata = 4;

    // A2A AgentCard as canonical JSON, propagated from registration. Empty for
    // agents that registered without one (e.g. the gRPC data plane).
    string agent_card = 5;
}

// ReportInvokeRequest is sent after an A2A Invoke completes so the control
// plane can record and broadcast it.
message ReportInvokeRequest {
    string caller_id = 1;
    string callee_id = 2;
    string capability = 3;
    int64 duration_ms = 4;
    bool ok = 5;
}

// ReportInvokeResponse is an empty acknowledgement.
message ReportInvokeResponse {}

// ReportTaskEventRequest reports a single A2A task state transition observed by
// the agent that owns the task.
message ReportTaskEventRequest {
    // The agent running the task (the callee).
    string agent_id = 1;
    // Task and context identifiers from the A2A task.
    string task_id = 2;
    string context_id = 3;
    // The capability the task is fulfilling.
    string capability = 4;
    // The new lifecycle state (e.g. "submitted", "working", "completed").
    string state = 5;
}

// ReportTaskEventResponse is an empty acknowledgement.
message ReportTaskEventResponse {}

